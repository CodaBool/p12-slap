name: slap
permissions: # required for oidc
  id-token: write
  contents: read
on:
  push:
    branchs: [main]
jobs:
  deploy:
    if: "! contains(github.event.commits[0].message, '[no ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Extract Pipline Vars
        run: |
          repo=${GITHUB_REPOSITORY#CodaBool/}
          echo "##[set-output name=repo;]${repo,,}" 
          echo "##[set-output name=stage;]${GITHUB_REF#refs/heads/}"
          build=$(echo "${SHA:0:7}.${RUN_NUMBER}"|tr -d '"')
          echo "##[set-output name=build;]${build}"
          echo "##[set-output name=run;]${RUN_NUMBER}"
        id: extract # allows use of ${{ steps.extract.outputs.stage }} for pipeline stage/repo
        env:
          SHA: ${{ toJSON(github.sha) }}
          RUN_NUMBER: ${{ toJSON(github.run_number) }}
      - uses: actions/setup-go@v3
        with:
          go-version: '^1.20.0' # https://github.com/actions/go-versions/blob/main/versions-manifest.json
      - name: Build Binary
        run: GOOS=linux GOARCH=arm64 go build -ldflags='-s -w' -o ./op/server main.go
      - uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::919759177803:role/gh-action-assume
          aws-region: us-east-1
      - name: lowest price
        run: aws --region=us-east-1 ec2 describe-spot-price-history --instance-types t4g.nano --start-time=$(date +%s) --product-descriptions="Linux/UNIX" --query 'SpotPriceHistory[*].{az:AvailabilityZone, price:SpotPrice}' | jq -r ".[] | select(.az == \"us-east-1a\") | .price"
      # - name: Upload
      #   run: aws s3 cp server s3://codabool-go/server # s3 cp will overwrite
      - uses: hashicorp/setup-packer@main
        with:
          version: "1.8.5" # https://releases.hashicorp.com/packer
      - name: Packer
        if: "! contains(github.event.commits[0].message, '[no ami]')"
        working-directory: ./op
        run: |
          packer init .
          packer build -var="unique_ami_name=${{ steps.extract.outputs.repo }}-${{ steps.extract.outputs.run }}" .
        env:
          PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.3.7 # https://releases.hashicorp.com/terraform
      - name: terraform
        working-directory: ./op
        run: |
          terraform init
          terraform apply -auto-approve -var="unique_ami_name=${{ steps.extract.outputs.repo }}-${{ steps.extract.outputs.run }}"
        # terraform plan -no-color