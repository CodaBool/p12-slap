name: slap
permissions: # required for oidc
  id-token: write
  contents: read
on:
  push:
    branchs: [main]
jobs:
  deploy:
    if: "! contains(github.event.commits[0].message, '[no ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Extract Pipline Vars
        run: |
          repo=${GITHUB_REPOSITORY#CodaBool/}
          echo "repo=${repo,,}" >> $GITHUB_STATE
          echo "stage=${GITHUB_REF#refs/heads/}" >> $GITHUB_STATE
          build=$(echo "${SHA:0:7}.${RUN_NUMBER}"|tr -d '"')
          echo "build=${build}" >> $GITHUB_STATE
          echo "run=${RUN_NUMBER}" >> $GITHUB_STATE
        id: extract # allows use of ${{ steps.extract.outputs.stage }} for pipeline stage/repo
        env:
          SHA: ${{ toJSON(github.sha) }}
          RUN_NUMBER: ${{ toJSON(github.run_number) }}
      # - uses: actions/setup-go@v3
      #   with:
      #     go-version: '^1.20.0' # https://github.com/actions/go-versions/blob/main/versions-manifest.json
      # - name: Build Binary
      #   working-directory: ./server
      #   # t4g runs on Arm-based 64 bit AWS Graviton2 processors
      #   # change GOARCH if instead using an intel based cpu
      #   # -ldflags="-s -w" strips ~1.3M unecessary info
      #   # -x enables verbose building
      #   run: GOOS=linux GOARCH=arm64 go build -ldflags='-s -w' -o ../ops/server main.go
      - uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::919759177803:role/gh-action-assume
          aws-region: us-east-1
      - name: check env
        run: |
          echo $GITHUB_STATE
          echo "${{ steps.extract.outputs.repo }}"
          echo "${{ steps.extract.outputs.stage }}"
          echo "${{ steps.extract.outputs.build }}"
          echo "${{ steps.extract.outputs.run }}"
      # - name: Pricing
      #   run: |
      #     price=$(aws --region=us-east-1 ec2 describe-spot-price-history --instance-types t4g.nano --start-time=$(date +%s) --product-descriptions="Linux/UNIX" --query 'SpotPriceHistory[*].{az:AvailabilityZone, price:SpotPrice}' | jq -r ".[] | select(.az == \"us-east-1a\") | .price")
      #     price_day=$(python3 -c "import sys; print(round(float(sys.argv[1]) * 24, 2))" $price)
      #     price_month=$(python3 -c "import sys; print(round(float(sys.argv[1]) * 24 * 30.4, 2))" $price)
      #     echo "Server will cost \$$price_day/day & \$$price_month/month"
      # # - name: Upload
      # #   run: aws s3 cp server s3://codabool-go/server # s3 cp will overwrite
      # - uses: hashicorp/setup-packer@main
      #   with:
      #     version: "1.8.5" # https://releases.hashicorp.com/packer
      # - name: Packer
      #   working-directory: ./ops
      #   run: |
      #     packer init .
      #     packer build -var="unique_ami_name=${{ steps.extract.outputs.repo }}-${{ steps.extract.outputs.run }}" .
      #   env:
      #     PACKER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.3.7 # https://releases.hashicorp.com/terraform
      - name: terraform
        working-directory: ./ops
        run: |
          terraform init
          terraform apply -auto-approve -var="ssh_ip=${{ secrets.WIN_IP }}"