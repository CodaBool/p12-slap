name: slap
permissions: # required for oidc
  id-token: write
  contents: read
on:
  push:
    branchs: [main]
jobs:
  deploy:
    if: "! contains(github.event.commits[0].message, '[no ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Extract Pipline Vars
      # The repo name must be validated since it will be used in the S3 Bucket creation when saving Serverless state
      # Repo name must follow S3 Naming conventions, no space & no uppercase
      # Lower Cases the Repo name, Github already removes space
        run: |
          repo=${GITHUB_REPOSITORY#CodaBool/}
          echo "##[set-output name=repo;]${repo,,}" 
          echo "##[set-output name=stage;]${GITHUB_REF#refs/heads/}"
          build=$(echo "${SHA:0:7}.${RUN_NUMBER}"|tr -d '"')
          echo "##[set-output name=build;]${build}"
      - uses: actions/setup-go@v3
        with:
          go-version: '^1.20.0' # https://github.com/actions/go-versions/blob/main/versions-manifest.json
      - name: Build Binary
        run: go build main.go
      - name: Assume
        uses: aws-actions/configure-aws-credentials@v1
        with:
          role-to-assume: arn:aws:iam::919759177803:role/gh-action-assume
          aws-region: us-east-1
      - name: Upload
        run: aws s3 cp server s3://codabool-go/server
      - uses: hashicorp/setup-packer@main
        with:
          version: "1.8.5" # https://releases.hashicorp.com/packer
      - name: Packer
        working-directory: ./op
        run: |
          packer init .
          packer build . -var="ami_name=$BUILD_ID"
        env:
          BUILD_ID: ${{ steps.extract.outputs.build }}
        # -color=false
        # packer validate ami.pkr.hcl # this was pretty time consuming
        # could try using -syntax-only
      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.3.7 # https://releases.hashicorp.com/terraform
      - name: terraform
        working-directory: ./op
        run: |
          terraform init
          terraform plan -no-color
      # - run: terraform plan -no-color